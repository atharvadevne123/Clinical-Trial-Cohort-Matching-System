version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://trialmatch:changeme@postgres:5432/trial_db
      - API_KEY=${API_KEY:-}
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=trialmatch
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=trial_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./metabase_setup.sql:/docker-entrypoint-initdb.d/01_metabase.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trialmatch -d trial_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase
      - MB_DB_PORT=5432
      - MB_DB_USER=trialmatch
      - MB_DB_PASS=changeme
      - MB_DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  postgres_data:
