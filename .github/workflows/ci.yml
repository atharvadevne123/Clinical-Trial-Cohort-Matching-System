name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install pytest pytest-cov pytest-asyncio ruff httpx
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          ruff check . --select E,F,W,I --ignore E501
          ruff format --check .

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --ignore=tests/test_recruitment.py \
            --ignore=tests/test_integration_e2e.py
        env:
          DATABASE_URL: sqlite:///./test.db

      - name: Smoke test key endpoints
        if: matrix.python-version == '3.11'
        run: |
          python -c "
          from fastapi.testclient import TestClient
          from src.main import app
          client = TestClient(app)
          for path in ['/ping', '/health', '/readyz', '/summary', '/matches', '/version']:
              r = client.get(path)
              assert r.status_code == 200, f'{path} returned {r.status_code}'
              print(f'OK {path}')
          "
        env:
          DATABASE_URL: sqlite:///./smoke.db

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mypy
        run: |
          pip install mypy fastapi pydantic sqlalchemy types-PyYAML httpx

      - name: Type check
        run: mypy src/ --ignore-missing-imports --no-error-summary
        continue-on-error: true
