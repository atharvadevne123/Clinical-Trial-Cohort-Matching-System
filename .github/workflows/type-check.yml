name: Type Check

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mypy fastapi pydantic sqlalchemy httpx \
            types-PyYAML numpy scipy xgboost scikit-learn joblib
          pip install -r requirements.txt

      - name: Run mypy on src/
        run: mypy src/ --ignore-missing-imports --no-error-summary --show-error-codes
        continue-on-error: true

      - name: Run mypy on tests/ (non-blocking)
        run: mypy tests/ --ignore-missing-imports --no-error-summary
        continue-on-error: true
